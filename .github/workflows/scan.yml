name: Shaw IMAX Availability Scan

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: |
          set -o pipefail
          python main.py 2>&1 | tee report.txt

      - name: Build report summary and static page
        if: ${{ !cancelled() }}
        run: |
          {
            echo "### Shaw IMAX Availability Report — $(TZ='Asia/Singapore' date +'%Y-%m-%d %H:%M %Z')"
            echo '```'
            cat report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          mkdir -p site
          {
            echo "<!doctype html><html><head><meta charset='utf-8'>"
            echo "<title>Shaw IMAX Availability</title></head><body>"
            echo "<h1>Shaw IMAX Availability Report</h1>"
            echo "<p>Generated: $(TZ='Asia/Singapore' date +'%Y-%m-%d %H:%M %Z')</p>"
            echo "<p>Updated every 30 minutes, 7:00am&ndash;11:00pm SGT.</p>"
            echo "<pre>"
            sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' report.txt
            echo "</pre></body></html>"
          } > site/index.html

      - uses: actions/upload-pages-artifact@v3
        if: ${{ !cancelled() }}
        with:
          path: site

  deploy:
    if: ${{ !cancelled() }}
    needs: scan
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
