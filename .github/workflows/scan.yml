name: Shaw IMAX Availability Scan

on:
  workflow_dispatch:
    inputs:
      deploy:
        description: "Trigger the deploy workflow after a successful scan"
        type: boolean
        default: true

permissions:
  contents: write
  actions: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m unittest discover -s tests -v

      - name: Run scan
        run: python main.py scan

      - name: Generate report
        run: |
          {
            echo '```'
            python main.py report
            echo '```'
          } | tee -a "$GITHUB_STEP_SUMMARY"

      - name: Publish scan output to the "latest" release
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          if gh release view latest --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            gh release upload latest artifacts/* --repo "$GITHUB_REPOSITORY" --clobber
          else
            gh release create latest artifacts/* \
              --repo "$GITHUB_REPOSITORY" \
              --title "Latest scan" \
              --notes "Automated scan output, overwritten every run. Not a software release."
          fi

      # success() is explicit here, not implicit: adding the inputs.deploy
      # check to `if` drops GitHub Actions' default "only run if everything
      # before this succeeded" behavior, so it has to be written back in.
      - name: Trigger deploy workflow
        if: ${{ success() && inputs.deploy }}
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: gh workflow run deploy.yml --repo "$GITHUB_REPOSITORY" --ref "$GITHUB_REF_NAME"
