name: Shaw IMAX Availability Scan

on:
  push:
    branches: [main]
    paths: ['.trigger']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: scan
  cancel-in-progress: false

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run scan
        run: |
          set -o pipefail
          python main.py 2>&1 | tee report.txt

      - name: Publish report to job summary
        if: always()
        run: |
          {
            echo "### Shaw IMAX Availability Report — $(TZ='Asia/Singapore' date +'%Y-%m-%d %H:%M %Z')"
            echo '```'
            cat report.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Build static report page
        if: always()
        run: |
          mkdir -p site
          {
            echo "<!doctype html><html><head><meta charset='utf-8'>"
            echo "<title>Shaw IMAX Availability</title></head><body>"
            echo "<h1>Shaw IMAX Availability Report</h1>"
            echo "<p>Generated: $(TZ='Asia/Singapore' date +'%Y-%m-%d %H:%M %Z')</p>"
            echo "<pre>"
            sed -e 's/&/\&amp;/g' -e 's/</\&lt;/g' -e 's/>/\&gt;/g' report.txt
            echo "</pre></body></html>"
          } > site/index.html

      - name: Publish to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: site
