name: Publish GitHub Pages Redirect

on:
  workflow_dispatch: {}

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  redirect:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Build redirect page
        env:
          TARGET_URL: https://${{ vars.CLOUDFLARE_PROJECT_NAME }}.pages.dev/
        run: |
          mkdir -p redirect
          cat > redirect/index.html <<HTML
          <!doctype html>
          <html>
          <head>
            <meta charset="utf-8">
            <meta http-equiv="refresh" content="0; url=$TARGET_URL">
            <link rel="canonical" href="$TARGET_URL">
            <title>Shaw IMAX Availability</title>
            <script>location.replace('$TARGET_URL' + location.search);</script>
          </head>
          <body>
            <p>This page has moved. If you are not redirected automatically,
            <a href="$TARGET_URL">click here</a>.</p>
          </body>
          </html>
          HTML

      - uses: actions/upload-pages-artifact@v3
        with:
          path: redirect

      - id: deployment
        uses: actions/deploy-pages@v4
