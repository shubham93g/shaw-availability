name: Deploy Shaw IMAX Availability Report

on:
  workflow_dispatch: {}

permissions:
  contents: read

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Download latest scan output
        id: download
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          mkdir -p site
          gh release download latest --repo "$GITHUB_REPOSITORY" --pattern "index.html" --dir site --clobber

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy site --project-name=${{ vars.CLOUDFLARE_PROJECT_NAME }}
