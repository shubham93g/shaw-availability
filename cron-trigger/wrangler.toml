name = "shaw-availability-cron"
main = "src/index.js"
compatibility_date = "2026-07-21"
workers_dev = false

[triggers]
# Cloudflare Cron Triggers run in UTC; SGT is UTC+8 with no DST.
# 7:00am-11:00pm SGT = 23:00 (previous day) - 15:00 UTC, every 30 min.
crons = [
  "0,30 23 * * *",   # 7:00am, 7:30am SGT
  "0,30 0-14 * * *", # 8:00am-10:30pm SGT
  "0 15 * * *",      # 11:00pm SGT
]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
GITHUB_OWNER = "shubham93g"
GITHUB_REPO = "shaw-availability"
GITHUB_WORKFLOW_FILE = "scan.yml"
GITHUB_REF = "main"

# GITHUB_TOKEN is a secret, not a var - set it with:
#   wrangler secret put GITHUB_TOKEN
