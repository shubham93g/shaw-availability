name = "shaw-availability-cron"
main = "src/index.js"
compatibility_date = "2026-07-21"
workers_dev = false

[triggers]
# Cloudflare Cron Triggers run in UTC; SGT is UTC+8 with no DST.
# 7:00am-10:30pm SGT = 23:00 (previous day) - 14:30 UTC, every 30 min.
# 11:00pm-7:00am SGT (overnight), every 2 hours instead: 11:00pm/1:00am/
# 3:00am/5:00am SGT = 15:00/17:00/19:00/21:00 UTC.
crons = [
  "0 15,17,19,21 * * *", # 11:00pm, 1:00am, 3:00am, 5:00am SGT
  "0,30 23,0-14 * * *",  # 7:00am-10:30pm SGT
]

[observability]
enabled = true
head_sampling_rate = 1

[vars]
GITHUB_OWNER = "shubham93g"
GITHUB_REPO = "shaw-availability"
GITHUB_WORKFLOW_FILE = "scan.yml"
GITHUB_REF = "main"

# GITHUB_TOKEN is a secret, not a var - set it with:
#   wrangler secret put GITHUB_TOKEN
